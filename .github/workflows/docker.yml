name: 打包镜像

on:
  workflow_dispatch:

# 仓库操作权限
permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 删除流程记录
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          retain_days: 0
          keep_minimum_runs: 0
        
      - name: 获取版本号
        run: |
          res=$(curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -sSL https://api.github.com/repos/NapNeko/NapCatQQ/releases/latest)
          current_tag=$(curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -sSL https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name')
          
          tag=$(echo "$res" | jq -r '.tag_name')
          body=$(echo "$res" | jq -r '.body')

          # 颜色定义
          GREEN='\033[0;32m'
          RED='\033[0;31m'
          YELLOW='\033[0;33m'
          BLUE='\033[0;34m'
          NC='\033[0m'

          echo -e "\n${BLUE}NapCat 最新版本：$tag${NC}"
          echo -e "${BLUE}${{ github.repository }} 当前版本：$current_tag${NC}\n"

          # 判断是否需要构建
          if [ "$tag" = "$current_tag" ]; then
            echo -e "${YELLOW}版本相同，跳过构建${NC}\n"
            echo "::notice::版本相同，已跳过构建"
            echo "skip=true" >> $GITHUB_ENV
            exit 0
          else
            echo -e "${GREEN}发现新版本，开始构建${NC}\n"
            echo "::notice::检测到新版本 $tag，开始构建"
            echo "skip=false" >> $GITHUB_ENV
          fi

          echo "tag=$tag" >> $GITHUB_ENV
          echo "update<<EOF" >> $GITHUB_ENV
          echo "$body" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
      - name: 设置 qemu
        if: env.skip != 'true'
        uses: docker/setup-qemu-action@master
        
      - name: 设置 docker buildx
        if: env.skip != 'true'
        uses: docker/setup-buildx-action@master
        
      - name: 登录 docker hub
        if: env.skip != 'true'
        uses: docker/login-action@master
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 打包并推送
        if: env.skip != 'true'
        uses: docker/build-push-action@master
        with:
          context: .
          provenance: false
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/${{ github.repository_owner }}/napcat:latest
            docker.io/${{ github.repository_owner }}/napcat:${{ env.tag }}
      - name: 退出登录
        if: env.skip != 'true'
        run: docker logout

      - name: 保存离线镜像包
        if: env.skip != 'true'
        run: |
          mkdir -p /opt/dk
          docker pull --platform linux/amd64 ${{ github.repository_owner }}/napcat:${{ env.tag }}
          docker save -o /opt/dk/napcat-x86_64-docker.tar ${{ github.repository_owner }}/napcat:${{ env.tag }}

          docker pull --platform linux/arm64 ${{ github.repository_owner }}/napcat:${{ env.tag }}
          docker save -o /opt/dk/napcat-arm64-docker.tar ${{ github.repository_owner }}/napcat:${{ env.tag }}

          sudo timedatectl set-timezone "Asia/Shanghai"
          echo "build_time=$(date '+%Y年%m月%d日%H:%M:%S' | jq -sRr @uri)" >> $GITHUB_ENV

      - name: 发布 Release
        if: env.skip != 'true'
        uses: softprops/action-gh-release@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
           > ### ![](https://img.shields.io/badge/%E7%BC%96%E8%AF%91%E6%97%B6%E9%97%B4-${{ env.build_time }}-8267?logo=github&labelColor=%E9%A1%BB)![](https://img.shields.io/github/downloads/${{ github.repository }}/${{ env.tag }}/total?label=%E4%B8%8B%E8%BD%BD%E6%AC%A1%E6%95%B0&logo=github)

           ${{ env.update }}
           
          tag_name: ${{ env.tag }}
          files: /opt/dk/*
          
